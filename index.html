<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; style-src 'self' 'unsafe-inline'"
    />
    <title>plan8</title>
    <link rel="stylesheet" href="node_modules/xterm/css/xterm.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div id="app">
      <aside id="sidebar">
        <div id="sidebar-header">
          <span class="logo">plan8</span>
          <button id="btn-new-agent" class="btn-icon" title="new agent">+</button>
        </div>
        <div id="agent-list"></div>
        <div id="sidebar-footer">
          <span id="nav-settings" class="sidebar-link">settings</span>
        </div>
      </aside>

      <main id="panel">
        <!-- setup view -->
        <section id="view-setup" class="view">
          <div class="centered-message">
            <div class="setup">
              <div class="setup-title">plan8</div>
              <p id="setup-status" class="setup-text">checking environment...</p>
              <div id="setup-commands"></div>
              <p id="setup-detail" class="setup-detail"></p>
            </div>
          </div>
        </section>

        <!-- empty state -->
        <section id="view-empty" class="view">
          <div class="centered-message">no agent selected</div>
        </section>

        <!-- settings view -->
        <section id="view-settings" class="view">
          <div class="panel-header">
            <h1>profiles</h1>
            <button id="btn-new-profile" class="btn">+ new profile</button>
          </div>
          <div class="panel-body">
            <div id="profile-list"></div>
          </div>
        </section>

        <!-- profile editor view -->
        <section id="view-profile-editor" class="view">
          <div class="panel-header">
            <button id="btn-back-settings" class="btn">&larr; back</button>
            <h1 id="editor-title"></h1>
            <button id="btn-save-profile" class="btn">save</button>
            <button id="btn-delete-profile" class="btn btn-danger">delete</button>
          </div>
          <div class="panel-body">
            <div class="field">
              <label>id</label>
              <input id="editor-id" type="text" placeholder="my-profile" autocomplete="off" />
            </div>
            <div class="field">
              <label>description</label>
              <input id="editor-description" type="text" placeholder="A brief description" autocomplete="off" />
            </div>
            <div class="field">
              <label>AGENTS.md</label>
              <textarea id="editor-prompt" rows="10" placeholder="you are an agent that..."></textarea>
            </div>
            <div class="field">
              <label>dockerfile</label>
              <textarea id="editor-dockerfile" rows="10" placeholder="FROM ubuntu:latest"></textarea>
            </div>
            <div class="field">
              <label>setup (runs after container start, with volumes mounted)</label>
              <textarea id="editor-setup" rows="10" placeholder="#!/bin/bash&#10;# runs after container start with volumes mounted&#10;# e.g. cd /agent/$NAME && git clone git@github.com:org/repo.git"></textarea>
            </div>
          </div>
        </section>

        <!-- agent detail view -->
        <section id="view-agent-detail" class="view">
          <div class="panel-header">
            <h1 id="detail-name"></h1>
            <span id="detail-profile-label" class="meta-label"></span>
            <button id="btn-agent" class="btn btn-session active">agent</button>
            <button id="btn-sandbox" class="btn btn-session">sandbox</button>
            <button id="btn-stop" class="btn btn-danger">stop</button>
          </div>
          <div id="terminal-container"></div>
        </section>
      </main>
    </div>
    <script src="node_modules/xterm/lib/xterm.js"></script>
    <script src="node_modules/@xterm/addon-fit/lib/addon-fit.js"></script>
    <script src="dist/renderer.js"></script>
  </body>
</html>
